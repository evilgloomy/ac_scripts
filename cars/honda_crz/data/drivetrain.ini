[TRACTION]
TYPE=FWD

[GEARS]
COUNT=1
GEAR_R=-4.51
GEAR_1=1.00
; CRITICAL CHANGE: High Final Drive to allow instant high-revving
FINAL=13.22   //5.274

[DIFFERENTIAL]
POWER=0.0                   ; Open Diff (FWD Eco Car)
COAST=0.0
PRELOAD=0

[GEARBOX]
